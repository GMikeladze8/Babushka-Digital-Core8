<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABUSHKA CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #00FF41; --bg: #000; }
        .mode-light { --main: #ff0055; --bg: #fff; }
        body { background-color: var(--bg); color: var(--main); font-family: 'Arial Black', sans-serif; transition: 0.2s; min-height: 100vh; }
        .card { border: 4px solid var(--main); padding: 20px; text-transform: uppercase; font-weight: 900; transition: 0.2s; cursor: pointer; }
        .card:hover { background: var(--main); color: var(--bg); transform: skewX(-5deg); }
        .hidden { display: none; }
    </style>
</head>
<body id="b">

    <div id="gate" class="h-screen flex flex-col items-center justify-center space-y-12">
        <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter uppercase">Babushka<span class="text-white">.</span></h1>
        <div class="flex gap-6 flex-wrap justify-center">
            <button onclick="s('fr')" class="border-4 border-current px-12 py-5 text-xl font-black hover:invert transition">FR</button>
            <button onclick="s('en')" class="border-4 border-current px-12 py-5 text-xl font-black hover:invert transition">EN</button>
            <button onclick="s('ru')" class="border-4 border-current px-12 py-5 text-xl font-black hover:invert transition">RU</button>
            <button onclick="s('ar')" class="border-4 border-current px-12 py-5 text-xl font-black hover:invert transition">AR</button>
        </div>
    </div>

    <div id="app" class="hidden p-6 md:p-20 max-w-7xl mx-auto">
        <button onclick="document.getElementById('b').classList.toggle('mode-light')" class="fixed top-8 right-8 border-4 border-current p-4 font-black hover:invert z-50 transition">ZAP</button>
        
        <div class="border-[10px] border-current p-10">
            <h2 id="h" class="text-4xl md:text-6xl font-black uppercase italic mb-16 leading-none tracking-tighter"></h2>
            
            <div id="g" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>

            <footer class="mt-20 pt-10 border-t-8 border-current flex flex-col md:flex-row justify-between items-end gap-10">
                <div class="font-black italic">
                    <p class="text-4xl tracking-tighter">+33 7 58 78 97 82</p>
                    <p class="text-xl opacity-70">contact@babushkahouse.fr</p>
                </div>
                <div class="flex gap-10 font-black">
                    <a href="https://wa.me/33758789782" class="text-2xl border-b-8 border-current uppercase">WhatsApp Direct</a>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const d = {
            fr: { h: "Transformation totale de votre bureau. Physique et Digital.", l: ["CRM", "Google Workspace", "Leads", "Web Dev", "Branding", "IA Automation", "Analytics", "Marketing"] },
            en: { h: "Total office transformation. Physical and Digital.", l: ["CRM", "Google Workspace", "Leads", "Web Dev", "Branding", "AI Automation", "Analytics", "Marketing"] },
            ru: { h: "Полная трансформация офиса. Физика и Диджитал.", l: ["CRM", "Google Workspace", "Лиды", "Сайты", "Брендинг", "ИИ Боты", "Аналитика", "Маркетинг"] },
            ar: { h: "التحول الكامل لمكتبك. مادي ورقمي.", l: ["نظام CRM", "Google Workspace", "توليد العملاء", "إنشاء المواقع", "الهوية البصرية", "الأتمتة", "تحليل البيانات", "تسويق"] }
        };

        function s(lang) {
            document.getElementById('gate').classList.add('hidden');
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            document.getElementById('h').innerText = d[lang].h;
            document.getElementById('g').innerHTML = d[lang].l.map(x => `<div class="card">${x}</div>`).join('');
            document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
        }
    </script>
</body>
</html>
